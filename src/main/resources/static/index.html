<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Spring + Vue</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }

        .card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: bold;
            color: #555;
        }

        .info-value {
            color: #667eea;
        }

        .message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
            width: 100%;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>Easy Spring + Vue</h1>
        
        <div v-if="loading" class="loading">
            加载中...
        </div>

        <div v-else>
            <div v-if="helloMessage" class="message">
                {{ helloMessage }}
            </div>

            <div class="card">
                <h2>项目信息</h2>
                <div v-if="projectInfo">
                    <div class="info-item">
                        <span class="info-label">项目名称:</span>
                        <span class="info-value">{{ projectInfo.project }}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">版本:</span>
                        <span class="info-value">{{ projectInfo.version }}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">描述:</span>
                        <span class="info-value">{{ projectInfo.description }}</span>
                    </div>
                </div>
            </div>

            <button @click="refreshData">刷新数据</button>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    helloMessage: '',
                    projectInfo: null,
                    loading: true
                };
            },
            methods: {
                async fetchHello() {
                    try {
                        const response = await fetch('/api/hello');
                        const data = await response.json();
                        this.helloMessage = data.message;
                    } catch (error) {
                        console.error('Error fetching hello:', error);
                        this.helloMessage = '无法连接到服务器';
                    }
                },
                async fetchInfo() {
                    try {
                        const response = await fetch('/api/info');
                        const data = await response.json();
                        this.projectInfo = data;
                    } catch (error) {
                        console.error('Error fetching info:', error);
                    }
                },
                async refreshData() {
                    this.loading = true;
                    await Promise.all([this.fetchHello(), this.fetchInfo()]);
                    this.loading = false;
                }
            },
            mounted() {
                this.refreshData();
            }
        }).mount('#app');
    </script>
</body>
</html>
